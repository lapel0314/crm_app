name: crm_app
description: A new Flutter project

publish_to: 'none'

version: 1.0.11+14

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.2
  supabase_flutter: ^2.0.0
  intl: ^0.20.2
  fl_chart: ^0.66.0
  shared_preferences: ^2.2.3
  win32: ^6.0.1
  ffi: ^2.2.0
  package_info_plus: ^10.0.0
  url_launcher: ^6.3.2
  android_intent_plus: ^6.0.0
  file_selector: ^1.0.4
  network_info_plus: ^8.0.0
  excel: ^4.0.6
  connectivity_plus: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700

name: Android Release Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Restore Android signing files
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/upload-keystore.jks
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Prepare Android local.properties
        shell: bash
        run: |
          VERSION_LINE=$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}')
          VERSION_NAME=${VERSION_LINE%%+*}
          VERSION_CODE=${VERSION_LINE##*+}
          SDK_DIR=${ANDROID_SDK_ROOT:-$ANDROID_HOME}
          cat <<EOF > android/local.properties
          sdk.dir=$SDK_DIR
          flutter.sdk=$FLUTTER_ROOT
          flutter.buildMode=release
          flutter.versionName=$VERSION_NAME
          flutter.versionCode=$VERSION_CODE
          EOF

      - name: Build signed APK
        shell: bash
        env:
          GRADLE_OPTS: >-
            -Xmx4096m
            -XX:MaxMetaspaceSize=1024m
            -Dfile.encoding=UTF-8
        run: |
          cd android
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          ./gradlew --no-daemon assembleRelease \
            -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8" \
            "-Ptarget-platform=android-arm,android-arm64,android-x64" \
            "-Pdart-defines=${{ secrets.FLUTTER_DART_DEFINES }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: crm-app-release-apk
          path: build/app/outputs/apk/release/app-release.apk
          if-no-files-found: error
